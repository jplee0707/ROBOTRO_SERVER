services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-robotro}
      POSTGRES_USER: ${POSTGRES_USER:-robotro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5434}:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8100/api}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://backend:8000/api}
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8100/api}
      PORT: 3000
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - ./frontend/.npmrc:/app/.npmrc:ro
      - ./frontend/components.json:/app/components.json:ro
      - ./frontend/eslint.config.mjs:/app/eslint.config.mjs:ro
      - ./frontend/next-env.d.ts:/app/next-env.d.ts
      - ./frontend/next.config.ts:/app/next.config.ts:ro
      - ./frontend/package-lock.json:/app/package-lock.json:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
  frontend_node_modules:
  frontend_next:
